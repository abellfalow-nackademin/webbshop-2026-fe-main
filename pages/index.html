<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <title>Plot Twist</title>
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/index.css" />
  </head>
  <body>
    <!-- HEADER -->
    <div id="navbar-container"></div>
    <main>
      <!-- HERO (full bredd) -->
      <section class="hero">
        <h1>Välkommen till Plot Twist</h1>
        <p>Uppröra grannskapet.</p>
      </section>

      <!-- SÖKSEKTION -->
      <section class="search-section">
        <div class="search-container">
          <h2>Sök efter växter</h2>
          <div class="search-wrapper">
            <input 
              type="text" 
              id="search-input" 
              placeholder="Sök efter växtnamn eller beskrivning..." 
              class="search-input"
            />
            <button id="search-button" class="search-button">🔍 Sök</button>
          </div>
        </div>
      </section>

      <section class="container">
        <div class="left-sec">
          <div id="map"></div>
        </div>
        <div class="right-sec">
          <h2>Tillgängliga växter</h2>
          <div id="products"></div>
        </div>
      </section>
    </main>
    <!-- FOOTER -->
    <div id="footer-container"></div>

    <!-- SID-SPECIFIK JAVASCRIPT -->
    <script type="module" src="../src/scripts/index.js"></script>
    <script type="module" src="../src/scripts/login.js"></script>
    <script type="module" src="../src/components/navbar.js"></script>
    <script type="module" src="../src/components/footer.js"></script>
    
  </body>
</html>
