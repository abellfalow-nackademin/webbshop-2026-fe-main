<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logga in - Plot Twist</title>
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/login.css" />
  </head>
  <body>
    <!-- HEADER -->
    <div id="navbar-container"></div>

    <!-- HUVUDINNEHÅLL -->
    <main class="main-content">
      <h1>Logga in</h1>
      <div id="login-container" class="login-wrapper">
        <form id="loginForm" class="login-form">
          <div class="form-group">
            <label for="email">E-post</label>
            <input type="email" id="loginEmail" required />
          </div>
          <div class="form-group">
            <label for="password">Lösenord</label>
            <input type="password" id="loginPassword" required />
          </div>
          <button type="submit">Logga in</button>
        </form>
      </div>
    </main>

    <!-- FOOTER -->
    <div id="footer-container"></div>

    <script type="module" src="../src/scripts/login.js"></script>
    <script type="module" src="../src/components/navbar.js"></script>
    <script type="module" src="../src/components/footer.js"></script>
  </body>
</html>
