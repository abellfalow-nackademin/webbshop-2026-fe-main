<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Hakim Livs</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <!-- HEADER -->
    <header class="site-header">
      <nav>
        <a href="index.html" class="logo">Hakim Livs</a>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="register.html">Register</a></li>
          <li><a href="login.html">Login</a></li>
        </ul>
      </nav>
    </header>

    <!-- MAIN CONTENT -->
    <main class="main-content">
      <h1 style="justify-self: center;">Login</h1>
      <div id="login-container" class="login-wrapper">
          <form id="loginForm" class="register-form">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="loginEmail" required />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="loginPassword" required />
          </div>
          <button type="submit">Login</button>
        </form>
      </div>
    </main>

    <!-- FOOTER -->
    <footer class="site-footer">
      <div class="footer-content">
        <p>&copy; 2024 Hakim Livs. All rights reserved.</p>
        <div class="footer-links">
          <a href="/about">About</a>
          <a href="/contact">Contact</a>
          <a href="/terms">Terms</a>
        </div>
      </div>
    </footer>

    <script type="module" src="./src/scripts/login.js"></script>
  </body>
</html>
